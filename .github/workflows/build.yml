name: Build Maxons

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to stamp into the build'
        required: false
        default: '0.0.0-dev'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show toolchain
        run: swift --version

      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app bundle
        run: ./scripts/build-app.sh "${{ steps.ver.outputs.version }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Maxons-${{ steps.ver.outputs.version }}
          path: |
            dist/Maxons.zip
            dist/Maxons.dmg
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Maxons.zip
            dist/Maxons.dmg
          generate_release_notes: true
          body: |
            ## Maxons ${{ steps.ver.outputs.version }}

            Leichtgewichtiges Window-Zonen-Snapping für macOS.

            ### Installation
            1. `Maxons.dmg` öffnen und **Maxons.app** in den Programme-Ordner ziehen
               (oder `Maxons.zip` entpacken).
            2. Da die App nicht über Apple notarisiert ist, einmalig die
               Gatekeeper-Quarantäne entfernen:
               ```
               xattr -dr com.apple.quarantine /Applications/Maxons.app
               ```
            3. Maxons starten und in **Systemeinstellungen › Datenschutz &
               Sicherheit › Bedienungshilfen** die Berechtigung erteilen.
